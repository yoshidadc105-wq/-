<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 社内マニュアルシステム</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">📋</div>
      <div class="login-logo-text">マニュアルシステム</div>
      <div class="login-logo-sub">社内限定</div>
    </div>

    <div id="alert" class="alert alert-error hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">ユーザー名</label>
        <input type="text" id="username" class="form-control" placeholder="ユーザー名を入力" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input type="password" id="password" class="form-control" placeholder="パスワードを入力" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">ログイン</button>
    </form>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const alert = document.getElementById('alert');

  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  alert.classList.add('hidden');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });

    const data = await res.json();

    if (res.ok) {
      window.location.href = '/';
    } else {
      alert.textContent = data.error || 'ログインに失敗しました';
      alert.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'ログイン';
    }
  } catch {
    alert.textContent = 'サーバーに接続できません';
    alert.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
});
</script>
</body>
</html>
