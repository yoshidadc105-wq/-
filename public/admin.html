<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者設定 - 社内マニュアルシステム</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">マニュアルシステム</a>
  <div class="navbar-right">
    <span class="navbar-user">ようこそ、<strong id="navUserName"></strong></span>
    <button onclick="logout()" class="btn btn-secondary btn-sm">ログアウト</button>
  </div>
</nav>

<div class="container">
  <div class="flex items-center justify-between mb-3">
    <div>
      <a href="/" class="text-sm" style="color: var(--primary);">← 一覧に戻る</a>
      <h1 style="font-size: 22px; font-weight: 700; margin-top: 4px;">管理者設定</h1>
    </div>
  </div>

  <!-- 統計 -->
  <div class="manual-grid mb-3" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));">
    <div class="card" style="padding: 16px; text-align: center;">
      <div style="font-size: 28px; font-weight: 700; color: var(--primary);" id="statManuals">-</div>
      <div class="text-sm text-muted">マニュアル総数</div>
    </div>
    <div class="card" style="padding: 16px; text-align: center;">
      <div style="font-size: 28px; font-weight: 700; color: var(--warning);" id="statPdf">-</div>
      <div class="text-sm text-muted">PDF</div>
    </div>
    <div class="card" style="padding: 16px; text-align: center;">
      <div style="font-size: 28px; font-weight: 700; color: var(--success);" id="statText">-</div>
      <div class="text-sm text-muted">テキスト</div>
    </div>
    <div class="card" style="padding: 16px; text-align: center;">
      <div style="font-size: 28px; font-weight: 700; color: var(--primary);" id="statUsers">-</div>
      <div class="text-sm text-muted">ユーザー数</div>
    </div>
    <div class="card" style="padding: 16px; text-align: center;">
      <div style="font-size: 28px; font-weight: 700; color: var(--text-muted);" id="statViews">-</div>
      <div class="text-sm text-muted">閲覧（7日間）</div>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('users', this)">ユーザー管理</div>
    <div class="tab" onclick="showTab('categories', this)">カテゴリ管理</div>
    <div class="tab" onclick="showTab('password', this)">パスワード変更</div>
  </div>

  <div id="alert" class="hidden"></div>

  <!-- ユーザー管理 -->
  <div id="tab-users">
    <div class="card">
      <div class="card-header">
        <span class="card-title">ユーザー一覧</span>
        <button onclick="openModal('userModal'); resetUserForm()" class="btn btn-primary btn-sm">+ ユーザー追加</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ユーザー名</th>
              <th>表示名</th>
              <th>メール</th>
              <th>権限</th>
              <th>状態</th>
              <th>最終ログイン</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="7" class="loading">読み込み中</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- カテゴリ管理 -->
  <div id="tab-categories" class="hidden">
    <div class="card">
      <div class="card-header">
        <span class="card-title">カテゴリ一覧</span>
        <button onclick="openModal('categoryModal'); resetCategoryForm()" class="btn btn-primary btn-sm">+ カテゴリ追加</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>カテゴリ名</th>
              <th>説明</th>
              <th>並び順</th>
              <th>マニュアル数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="categoryTableBody">
            <tr><td colspan="5" class="loading">読み込み中</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- パスワード変更 -->
  <div id="tab-password" class="hidden">
    <div class="card" style="max-width: 440px;">
      <div class="card-header"><span class="card-title">パスワード変更</span></div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">現在のパスワード <span class="required">*</span></label>
          <input type="password" id="currentPw" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">新しいパスワード <span class="required">*</span></label>
          <input type="password" id="newPw" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">新しいパスワード（確認） <span class="required">*</span></label>
          <input type="password" id="confirmPw" class="form-control">
        </div>
        <button onclick="changePassword()" class="btn btn-primary">変更する</button>
      </div>
    </div>
  </div>
</div>

<!-- ユーザーモーダル -->
<div class="modal-overlay hidden" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="userModalTitle">ユーザー追加</span>
      <button class="modal-close" onclick="closeModal('userModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label class="form-label">ユーザー名 <span class="required">*</span></label>
        <input type="text" id="uUsername" class="form-control" placeholder="半角英数字">
      </div>
      <div class="form-group">
        <label class="form-label">表示名 <span class="required">*</span></label>
        <input type="text" id="uDisplayName" class="form-control" placeholder="例: 山田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">メールアドレス <span class="required">*</span></label>
        <input type="email" id="uEmail" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label" id="uPasswordLabel">パスワード <span class="required">*</span></label>
        <input type="password" id="uPassword" class="form-control" placeholder="6文字以上">
        <div id="uPasswordHint" class="text-sm text-muted mt-1 hidden">空白のままにすると変更しません</div>
      </div>
      <div class="form-group">
        <label class="form-label">権限</label>
        <select id="uRole" class="form-control">
          <option value="user">一般ユーザー</option>
          <option value="admin">管理者</option>
        </select>
      </div>
      <div class="form-group" id="uActiveGroup">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="uActive" checked>
          <span>アカウントを有効にする</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('userModal')" class="btn btn-secondary">キャンセル</button>
      <button onclick="saveUser()" class="btn btn-primary" id="saveUserBtn">追加する</button>
    </div>
  </div>
</div>

<!-- カテゴリモーダル -->
<div class="modal-overlay hidden" id="categoryModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="categoryModalTitle">カテゴリ追加</span>
      <button class="modal-close" onclick="closeModal('categoryModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editCategoryId">
      <div class="form-group">
        <label class="form-label">カテゴリ名 <span class="required">*</span></label>
        <input type="text" id="cName" class="form-control" placeholder="例: 業務マニュアル">
      </div>
      <div class="form-group">
        <label class="form-label">説明（任意）</label>
        <input type="text" id="cDesc" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">並び順</label>
        <input type="number" id="cSort" class="form-control" value="0" min="0">
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('categoryModal')" class="btn btn-secondary">キャンセル</button>
      <button onclick="saveCategory()" class="btn btn-primary" id="saveCategoryBtn">追加する</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let currentUser = null;

async function init() {
  currentUser = await loadCurrentUser();
  if (!currentUser) return;
  if (currentUser.role !== 'admin') { window.location.href = '/'; return; }
  initNavbar(currentUser);
  await loadStats();
  await loadUsers();
}

async function loadStats() {
  const res = await fetch('/api/admin/stats');
  const s = await res.json();
  document.getElementById('statManuals').textContent = s.totalManuals;
  document.getElementById('statPdf').textContent = s.pdfManuals;
  document.getElementById('statText').textContent = s.textManuals;
  document.getElementById('statUsers').textContent = s.totalUsers;
  document.getElementById('statViews').textContent = s.recentViews;
}

function showTab(name, el) {
  ['users', 'categories', 'password'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.add('hidden');
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.remove('hidden');
  el.classList.add('active');

  if (name === 'users') loadUsers();
  if (name === 'categories') loadCategories();
}

// ── ユーザー管理 ──
async function loadUsers() {
  const res = await fetch('/api/admin/users');
  const users = await res.json();
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td style="font-weight: 500;">${u.username}</td>
      <td>${u.display_name}</td>
      <td>${u.email}</td>
      <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role === 'admin' ? '管理者' : '一般'}</span></td>
      <td><span style="color: ${u.is_active ? 'var(--success)' : 'var(--danger)'};">${u.is_active ? '有効' : '無効'}</span></td>
      <td class="text-sm text-muted">${u.last_login ? formatDate(u.last_login) : '未ログイン'}</td>
      <td>
        <div class="flex gap-2">
          <button onclick="editUser(${JSON.stringify(u).replace(/"/g, '&quot;')})" class="btn btn-secondary btn-sm">編集</button>
          ${u.id !== currentUser.id ? `<button onclick="deleteUser(${u.id}, '${u.display_name}')" class="btn btn-danger btn-sm">削除</button>` : ''}
        </div>
      </td>
    </tr>
  `).join('');
}

function resetUserForm() {
  document.getElementById('editUserId').value = '';
  document.getElementById('userModalTitle').textContent = 'ユーザー追加';
  document.getElementById('saveUserBtn').textContent = '追加する';
  document.getElementById('uUsername').value = '';
  document.getElementById('uUsername').disabled = false;
  document.getElementById('uDisplayName').value = '';
  document.getElementById('uEmail').value = '';
  document.getElementById('uPassword').value = '';
  document.getElementById('uPasswordHint').classList.add('hidden');
  document.getElementById('uPasswordLabel').innerHTML = 'パスワード <span class="required">*</span>';
  document.getElementById('uRole').value = 'user';
  document.getElementById('uActive').checked = true;
  document.getElementById('uActiveGroup').classList.remove('hidden');
}

function editUser(u) {
  document.getElementById('editUserId').value = u.id;
  document.getElementById('userModalTitle').textContent = 'ユーザー編集';
  document.getElementById('saveUserBtn').textContent = '更新する';
  document.getElementById('uUsername').value = u.username;
  document.getElementById('uUsername').disabled = true;
  document.getElementById('uDisplayName').value = u.display_name;
  document.getElementById('uEmail').value = u.email;
  document.getElementById('uPassword').value = '';
  document.getElementById('uPasswordHint').classList.remove('hidden');
  document.getElementById('uPasswordLabel').innerHTML = 'パスワード';
  document.getElementById('uRole').value = u.role;
  document.getElementById('uActive').checked = !!u.is_active;
  if (u.id === currentUser.id) document.getElementById('uActiveGroup').classList.add('hidden');
  openModal('userModal');
}

async function saveUser() {
  const id = document.getElementById('editUserId').value;
  const body = {
    username: document.getElementById('uUsername').value.trim(),
    display_name: document.getElementById('uDisplayName').value.trim(),
    email: document.getElementById('uEmail').value.trim(),
    password: document.getElementById('uPassword').value,
    role: document.getElementById('uRole').value,
    is_active: document.getElementById('uActive').checked
  };

  const url = id ? `/api/admin/users/${id}` : '/api/admin/users';
  const method = id ? 'PUT' : 'POST';

  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();

  if (res.ok) {
    closeModal('userModal');
    showAlert('alert', data.message, 'success');
    loadUsers();
    loadStats();
  } else {
    showAlert('alert', data.error || '操作に失敗しました', 'error');
  }
}

async function deleteUser(id, name) {
  if (!confirmDialog(`「${name}」を削除しますか？`)) return;
  const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (res.ok) {
    showAlert('alert', data.message, 'success');
    loadUsers();
    loadStats();
  } else {
    showAlert('alert', data.error || '削除に失敗しました', 'error');
  }
}

// ── カテゴリ管理 ──
async function loadCategories() {
  const res = await fetch('/api/categories');
  const cats = await res.json();
  const tbody = document.getElementById('categoryTableBody');
  if (cats.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted" style="padding: 24px;">カテゴリがありません</td></tr>';
    return;
  }
  tbody.innerHTML = cats.map(c => `
    <tr>
      <td style="font-weight: 500;">${c.name}</td>
      <td class="text-muted">${c.description || '-'}</td>
      <td>${c.sort_order}</td>
      <td>${c.manual_count}</td>
      <td>
        <div class="flex gap-2">
          <button onclick="editCategory(${JSON.stringify(c).replace(/"/g, '&quot;')})" class="btn btn-secondary btn-sm">編集</button>
          <button onclick="deleteCategory(${c.id}, '${c.name}')" class="btn btn-danger btn-sm">削除</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function resetCategoryForm() {
  document.getElementById('editCategoryId').value = '';
  document.getElementById('categoryModalTitle').textContent = 'カテゴリ追加';
  document.getElementById('saveCategoryBtn').textContent = '追加する';
  document.getElementById('cName').value = '';
  document.getElementById('cDesc').value = '';
  document.getElementById('cSort').value = '0';
}

function editCategory(c) {
  document.getElementById('editCategoryId').value = c.id;
  document.getElementById('categoryModalTitle').textContent = 'カテゴリ編集';
  document.getElementById('saveCategoryBtn').textContent = '更新する';
  document.getElementById('cName').value = c.name;
  document.getElementById('cDesc').value = c.description || '';
  document.getElementById('cSort').value = c.sort_order;
  openModal('categoryModal');
}

async function saveCategory() {
  const id = document.getElementById('editCategoryId').value;
  const body = {
    name: document.getElementById('cName').value.trim(),
    description: document.getElementById('cDesc').value.trim(),
    sort_order: parseInt(document.getElementById('cSort').value) || 0
  };

  const url = id ? `/api/categories/${id}` : '/api/categories';
  const method = id ? 'PUT' : 'POST';

  const res = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();

  if (res.ok) {
    closeModal('categoryModal');
    showAlert('alert', data.message, 'success');
    loadCategories();
  } else {
    showAlert('alert', data.error || '操作に失敗しました', 'error');
  }
}

async function deleteCategory(id, name) {
  if (!confirmDialog(`「${name}」を削除しますか？\nこのカテゴリのマニュアルはカテゴリなしになります。`)) return;
  const res = await fetch(`/api/categories/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (res.ok) {
    showAlert('alert', data.message, 'success');
    loadCategories();
  } else {
    showAlert('alert', data.error || '削除に失敗しました', 'error');
  }
}

// ── パスワード変更 ──
async function changePassword() {
  const current = document.getElementById('currentPw').value;
  const newPw = document.getElementById('newPw').value;
  const confirm = document.getElementById('confirmPw').value;

  if (newPw !== confirm) {
    showAlert('alert', '新しいパスワードが一致しません', 'error');
    return;
  }

  const res = await fetch('/api/auth/change-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ currentPassword: current, newPassword: newPw })
  });
  const data = await res.json();
  showAlert('alert', data.message || data.error, res.ok ? 'success' : 'error');
  if (res.ok) {
    document.getElementById('currentPw').value = '';
    document.getElementById('newPw').value = '';
    document.getElementById('confirmPw').value = '';
  }
}

init();
</script>
</body>
</html>
