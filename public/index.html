<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マニュアル一覧 - 社内マニュアルシステム</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ナビバー -->
<nav class="navbar">
  <a href="/" class="navbar-brand">マニュアルシステム</a>
  <div class="navbar-right">
    <span class="navbar-user">ようこそ、<strong id="navUserName"></strong></span>
    <a href="/admin.html" id="navAdminLink" class="btn btn-secondary btn-sm hidden">管理者設定</a>
    <a href="/account.html" class="btn btn-secondary btn-sm">アカウント設定</a>
    <button onclick="logout()" class="btn btn-secondary btn-sm">ログアウト</button>
  </div>
</nav>

<div class="container">
  <div class="layout">

    <!-- サイドバー（カテゴリ） -->
    <aside class="sidebar">
      <div class="card">
        <div class="card-body" style="padding: 12px 0;">
          <div class="sidebar-section-title">カテゴリ</div>
          <ul class="sidebar-nav" id="categoryNav">
            <li><a href="#" class="active" data-category="">すべて</a></li>
          </ul>
          <div class="sidebar-section-title" style="margin-top: 16px;">最近見たもの</div>
          <ul class="sidebar-nav" id="recentNav"></ul>
        </div>
      </div>

      <div class="mt-2" style="display:flex; flex-direction:column; gap:8px;">
        <a href="/create.html" class="btn btn-primary w-full">+ 新規マニュアル作成</a>
        <a href="/bulk-import.html" class="btn btn-secondary w-full">📂 PDF一括インポート</a>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <div class="flex items-center justify-between mb-2">
        <h1 style="font-size: 20px; font-weight: 700;" id="pageTitle">すべてのマニュアル</h1>
        <div class="flex gap-2">
          <button onclick="setViewMode('grid')" id="btnGrid" class="btn btn-secondary btn-sm">▦ グリッド</button>
          <button onclick="setViewMode('list')" id="btnList" class="btn btn-secondary btn-sm">☰ リスト</button>
        </div>
      </div>

      <!-- 検索バー -->
      <div class="search-bar">
        <input type="text" id="searchInput" class="form-control" placeholder="タイトル・説明で検索...">
        <select id="typeFilter" class="form-control" style="width: auto;">
          <option value="">種別：すべて</option>
          <option value="pdf">PDF</option>
          <option value="rich_text">テキスト</option>
        </select>
        <button onclick="loadManuals(1)" class="btn btn-primary">検索</button>
      </div>

      <div id="alert" class="hidden"></div>
      <div id="manualList"><div class="loading">読み込み中</div></div>
      <div id="pagination" class="pagination"></div>
    </main>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let currentPage = 1;
let currentCategory = '';
let viewMode = localStorage.getItem('viewMode') || 'grid';
let currentUser = null;

async function init() {
  currentUser = await loadCurrentUser();
  if (!currentUser) return;
  initNavbar(currentUser);
  await loadCategories();
  await loadRecent();
  await loadManuals(1);
  setViewMode(viewMode);

  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadManuals(1);
  });
}

async function loadCategories() {
  const res = await fetch('/api/categories');
  const cats = await res.json();
  const nav = document.getElementById('categoryNav');
  nav.innerHTML = `<li><a href="#" class="${currentCategory === '' ? 'active' : ''}" onclick="filterByCategory('', 'すべて', this)">すべて</a></li>`;

  const roots = cats.filter(c => !c.parent_id);
  const children = (parentId) => cats.filter(c => c.parent_id == parentId);

  function renderNode(c, depth) {
    const indent = depth * 12;
    const kids = children(c.id);
    const nameEscaped = c.name.replace(/'/g, "\\'");

    if (kids.length > 0) {
      let html = `<li>
        <a href="#" onclick="toggleCategory(${c.id}, '${nameEscaped}', this)"
           style="padding-left:${12 + indent}px; font-size:${depth > 0 ? '13px' : '14px'}; display:flex; align-items:center; justify-content:space-between;">
          <span>${depth > 0 ? '└ ' : ''}${c.name} <span class="text-muted text-sm">(${c.manual_count})</span></span>
          <span id="arrow-${c.id}" style="font-size:10px; margin-right:6px; color:var(--text-muted); flex-shrink:0;">▶</span>
        </a>
        <ul id="sub-${c.id}" style="display:none; list-style:none; margin:0; padding:0;">`;
      kids.forEach(kid => { html += renderNode(kid, depth + 1); });
      html += `</ul></li>`;
      return html;
    }

    return `<li><a href="#" onclick="filterByCategory(${c.id}, '${nameEscaped}', this)"
       style="padding-left:${12 + indent}px; font-size:${depth > 0 ? '13px' : '14px'};">
      ${depth > 0 ? '└ ' : ''}${c.name}
      <span class="text-muted text-sm">(${c.manual_count})</span>
    </a></li>`;
  }

  roots.forEach(c => { nav.innerHTML += renderNode(c, 0); });
}

function toggleCategory(id, name, el) {
  filterByCategory(id, name, el);
  const sub = document.getElementById(`sub-${id}`);
  const arrow = document.getElementById(`arrow-${id}`);
  if (sub) {
    const isOpen = sub.style.display !== 'none';
    sub.style.display = isOpen ? 'none' : '';
    if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
  }
}

async function loadRecent() {
  const res = await fetch('/api/manuals/history/recent');
  const list = await res.json();
  const nav = document.getElementById('recentNav');
  if (list.length === 0) {
    nav.innerHTML = '<li style="padding: 4px 12px; font-size: 12px; color: var(--text-muted);">まだ閲覧履歴がありません</li>';
    return;
  }
  nav.innerHTML = list.slice(0, 5).map(m => `
    <li><a href="/view.html?id=${m.id}" style="font-size: 13px;">
      ${m.type === 'pdf' ? '📄' : '📝'} ${m.title.length > 20 ? m.title.slice(0, 20) + '…' : m.title}
    </a></li>
  `).join('');
}

function filterByCategory(id, name, el) {
  currentCategory = id;
  document.querySelectorAll('#categoryNav a').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pageTitle').textContent = name;
  loadManuals(1);
}

function setViewMode(mode) {
  viewMode = mode;
  localStorage.setItem('viewMode', mode);
  document.getElementById('btnGrid').className = `btn btn-sm ${mode === 'grid' ? 'btn-primary' : 'btn-secondary'}`;
  document.getElementById('btnList').className = `btn btn-sm ${mode === 'list' ? 'btn-primary' : 'btn-secondary'}`;
  if (document.getElementById('manualList').children.length > 0) renderManuals(window._lastManuals || []);
}

async function loadManuals(page = 1) {
  currentPage = page;
  const search = document.getElementById('searchInput').value;
  const type = document.getElementById('typeFilter').value;

  const params = new URLSearchParams({ page, limit: 20 });
  if (search) params.set('search', search);
  if (currentCategory) params.set('category_id', currentCategory);
  if (type) params.set('type', type);

  const res = await fetch(`/api/manuals?${params}`);
  const data = await res.json();

  window._lastManuals = data.manuals;
  renderManuals(data.manuals);
  renderPagination(data.total, data.page, data.limit);
}

function renderManuals(manuals) {
  const container = document.getElementById('manualList');

  if (manuals.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📂</div>マニュアルが見つかりません</div>`;
    return;
  }

  if (viewMode === 'grid') {
    container.className = 'manual-grid';
    container.innerHTML = manuals.map(m => `
      <a href="/view.html?id=${m.id}" class="manual-card">
        <div class="flex items-center gap-2">
          <span class="badge ${m.type === 'pdf' ? 'badge-pdf' : m.type === 'steps' ? 'badge-steps' : 'badge-text'}">${m.type === 'pdf' ? 'PDF' : m.type === 'steps' ? 'ステップ' : 'テキスト'}</span>
          ${m.category_name ? `<span class="text-sm text-muted">${m.category_name}</span>` : ''}
        </div>
        <div class="manual-card-title">${m.title}</div>
        ${m.description ? `<div class="manual-card-desc">${m.description}</div>` : ''}
        <div class="manual-card-meta">
          <span>${m.created_by_name}</span>
          <span>·</span>
          <span>${formatDate(m.updated_at)}</span>
          ${m.file_size ? `<span>· ${formatFileSize(m.file_size)}</span>` : ''}
        </div>
      </a>
    `).join('');
  } else {
    container.className = '';
    container.innerHTML = `
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>種別</th>
                <th>タイトル</th>
                <th>カテゴリ</th>
                <th>作成者</th>
                <th>更新日時</th>
                <th>サイズ</th>
              </tr>
            </thead>
            <tbody>
              ${manuals.map(m => `
                <tr onclick="location.href='/view.html?id=${m.id}'" style="cursor:pointer;">
                  <td><span class="badge ${m.type === 'pdf' ? 'badge-pdf' : m.type === 'steps' ? 'badge-steps' : 'badge-text'}">${m.type === 'pdf' ? 'PDF' : m.type === 'steps' ? 'ステップ' : 'テキスト'}</span></td>
                  <td style="font-weight: 500;">${m.title}</td>
                  <td>${m.category_name || '<span class="text-muted">-</span>'}</td>
                  <td>${m.created_by_name}</td>
                  <td>${formatDate(m.updated_at)}</td>
                  <td>${formatFileSize(m.file_size) || '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
}

function renderPagination(total, page, limit) {
  const totalPages = Math.ceil(total / limit);
  const container = document.getElementById('pagination');

  if (totalPages <= 1) { container.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="loadManuals(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;

  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - page) <= 2) {
      html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadManuals(${i})">${i}</button>`;
    } else if (Math.abs(i - page) === 3) {
      html += `<span class="page-btn" style="cursor:default;">…</span>`;
    }
  }

  html += `<button class="page-btn" onclick="loadManuals(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;
  container.innerHTML = html;
}

init();
</script>
</body>
</html>
