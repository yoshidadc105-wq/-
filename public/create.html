<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マニュアル作成 - 社内マニュアルシステム</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    .ql-container { font-size: 15px; min-height: 400px; }
    .ql-editor { min-height: 400px; }
    .step-image-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .step-image-drop:hover { border-color: var(--primary); background: var(--primary-light); }
    .step-image-drop img { max-width: 100%; max-height: 300px; border-radius: 4px; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">マニュアルシステム</a>
  <div class="navbar-right">
    <span class="navbar-user">ようこそ、<strong id="navUserName"></strong></span>
    <a href="/admin.html" id="navAdminLink" class="btn btn-secondary btn-sm hidden">管理者設定</a>
    <a href="/progress.html" id="navProgressLink" class="btn btn-secondary btn-sm hidden">進捗管理</a>
    <a href="/account.html" class="btn btn-secondary btn-sm">アカウント設定</a>
    <button onclick="logout()" class="btn btn-secondary btn-sm">ログアウト</button>
  </div>
</nav>

<div class="container" style="max-width: 900px;">
  <div class="flex items-center justify-between mb-3">
    <div>
      <a href="/" class="text-sm" style="color: var(--primary);">← 一覧に戻る</a>
      <h1 style="font-size: 22px; font-weight: 700; margin-top: 4px;" id="pageTitle">新規マニュアル作成</h1>
    </div>
  </div>

  <div id="alert" class="hidden"></div>

  <!-- 種別タブ（新規作成時のみ表示） -->
  <div id="typeTabs" class="tabs">
    <div class="tab active" onclick="switchType('rich_text', this)">📝 テキストで作成</div>
    <div class="tab" onclick="switchType('pdf', this)">📄 PDFをアップロード</div>
    <div class="tab" onclick="switchType('steps', this)">📋 ステップで作成</div>
  </div>

  <form id="manualForm">
    <!-- 共通フィールド -->
    <div class="card mb-2">
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">タイトル <span class="required">*</span></label>
          <input type="text" id="title" class="form-control" placeholder="マニュアルのタイトルを入力" required>
        </div>
        <div class="form-group">
          <label class="form-label">説明（任意）</label>
          <input type="text" id="description" class="form-control" placeholder="このマニュアルの概要を入力">
        </div>
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <select id="categorySelect" class="form-control">
            <option value="">カテゴリなし</option>
          </select>
        </div>
      </div>
    </div>

    <!-- テキストエディタ -->
    <div id="textSection" class="card mb-2">
      <div class="card-header"><span class="card-title">本文</span></div>
      <div class="card-body" style="padding: 0;">
        <div id="editor"></div>
      </div>
    </div>

    <!-- PDFアップロード -->
    <div id="pdfSection" class="card mb-2 hidden">
      <div class="card-header"><span class="card-title">PDFファイル</span></div>
      <div class="card-body">
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('pdfFile').click()">
          <div class="upload-area-icon">📄</div>
          <div class="upload-area-text">クリックしてPDFを選択</div>
          <div class="upload-area-hint">またはここにファイルをドラッグ＆ドロップ</div>
          <div id="fileNameDisplay" class="mt-1" style="font-weight: 500; color: var(--success);"></div>
        </div>
        <input type="file" id="pdfFile" accept=".pdf" style="display:none;">
        <p class="text-sm text-muted mt-1">最大100MBのPDFファイル</p>
        <div id="replacePdfOption" class="hidden mt-2">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" id="replacePdfCheck" onchange="toggleReplaceMode(this.checked)">
            <span>PDFファイルを差し替える</span>
          </label>
        </div>
      </div>
    </div>

    <!-- ステップエディタ -->
    <div id="stepsSection" class="hidden">
      <!-- カバー画像 -->
      <div class="card mb-2">
        <div class="card-header"><span class="card-title">カバー画像（任意）</span></div>
        <div class="card-body">
          <div class="step-image-drop" id="coverImageDrop" onclick="document.getElementById('coverImageInput').click()">
            <div style="color:var(--text-muted); font-size:14px;">🖼 クリックして画像を選択（任意）</div>
          </div>
          <input type="file" id="coverImageInput" accept="image/*" style="display:none;" onchange="uploadCoverImage(this)">
        </div>
      </div>

      <!-- ステップリスト -->
      <div id="stepsList"></div>

      <div class="mb-2">
        <button type="button" onclick="addStep()" class="btn btn-secondary w-full" style="font-size:15px; padding:12px;">＋ ステップを追加</button>
      </div>
    </div>

    <div class="flex gap-2">
      <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">保存する</button>
      <a href="/" class="btn btn-secondary btn-lg">キャンセル</a>
    </div>
  </form>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script src="/js/common.js"></script>
<script>
let currentUser = null;
let editId = null;
let currentType = 'rich_text';
let editManual = null;
let quill = null;

// ステップ管理
let coverImageName = null;
let steps = [];
let stepCounter = 0;

async function init() {
  currentUser = await loadCurrentUser();
  if (!currentUser) return;
  initNavbar(currentUser);

  quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ color: [] }, { background: [] }],
        [{ list: 'ordered' }, { list: 'bullet' }],
        [{ indent: '-1' }, { indent: '+1' }],
        ['blockquote', 'code-block'],
        ['link', 'image'],
        ['clean']
      ]
    },
    placeholder: 'マニュアルの本文を入力してください...'
  });

  await loadCategories();

  const params = new URLSearchParams(window.location.search);
  editId = params.get('id');
  if (editId) await loadEditData();

  document.getElementById('pdfFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) document.getElementById('fileNameDisplay').textContent = `選択: ${file.name}`;
  });

  const area = document.getElementById('uploadArea');
  area.addEventListener('dragover', (e) => { e.preventDefault(); area.classList.add('dragover'); });
  area.addEventListener('dragleave', () => area.classList.remove('dragover'));
  area.addEventListener('drop', (e) => {
    e.preventDefault();
    area.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      document.getElementById('pdfFile').files = e.dataTransfer.files;
      document.getElementById('fileNameDisplay').textContent = `選択: ${file.name}`;
    } else {
      showAlert('alert', 'PDFファイルのみ対応しています', 'error');
    }
  });

  document.getElementById('manualForm').addEventListener('submit', handleSubmit);
}

async function loadCategories() {
  const res = await fetch('/api/categories');
  const cats = await res.json();
  const select = document.getElementById('categorySelect');
  select.innerHTML = '<option value="">カテゴリなし</option>';
  function addOpts(parentId, depth) {
    cats.filter(c => parentId === null ? !c.parent_id : c.parent_id == parentId).forEach(c => {
      const prefix = '　'.repeat(depth);
      const label = depth > 0 ? prefix + '└ ' + c.name : c.name;
      select.innerHTML += `<option value="${c.id}">${label}</option>`;
      addOpts(c.id, depth + 1);
    });
  }
  addOpts(null, 0);
}

async function loadEditData() {
  const res = await fetch(`/api/manuals/${editId}`);
  if (!res.ok) { window.location.href = '/'; return; }

  editManual = await res.json();
  document.getElementById('pageTitle').textContent = 'マニュアルを編集';
  document.getElementById('submitBtn').textContent = '更新する';
  document.getElementById('title').value = editManual.title;
  document.getElementById('description').value = editManual.description || '';
  document.getElementById('categorySelect').value = editManual.category_id || '';

  document.getElementById('typeTabs').classList.add('hidden');

  if (editManual.type === 'pdf') {
    switchType('pdf');
    document.getElementById('uploadArea').innerHTML = `
      <div class="upload-area-icon">📄</div>
      <div class="upload-area-text" style="color: var(--text);">${editManual.file_name}</div>
      <div class="upload-area-hint">${formatFileSize(editManual.file_size)}</div>
    `;
    document.getElementById('replacePdfOption').classList.remove('hidden');
  } else if (editManual.type === 'steps') {
    switchType('steps');
    let stepsData = {};
    try { stepsData = JSON.parse(editManual.content || '{}'); } catch(e) {}
    coverImageName = stepsData.cover_image || null;
    if (coverImageName) {
      const drop = document.getElementById('coverImageDrop');
      drop.innerHTML = `<img src="/uploads/${coverImageName}" style="max-width:100%; max-height:200px; border-radius:4px;">`;
    }
    steps = (stepsData.steps || []).map(s => ({
      id: ++stepCounter,
      title: s.title || '',
      imageName: s.image || null,
      description: s.description || ''
    }));
    renderSteps();
  } else {
    switchType('rich_text');
    quill.root.innerHTML = editManual.content || '';
  }
}

function switchType(type, tabEl) {
  currentType = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');
  document.getElementById('textSection').classList.toggle('hidden', type !== 'rich_text');
  document.getElementById('pdfSection').classList.toggle('hidden', type !== 'pdf');
  document.getElementById('stepsSection').classList.toggle('hidden', type !== 'steps');
}

function toggleReplaceMode(checked) {
  const area = document.getElementById('uploadArea');
  if (checked) {
    area.onclick = () => document.getElementById('pdfFile').click();
    area.style.cursor = 'pointer';
  } else {
    area.onclick = null;
    area.style.cursor = 'default';
  }
}

// ---- ステップ管理 ----

function addStep() {
  steps.push({ id: ++stepCounter, title: '', imageName: null, description: '' });
  renderSteps();
  // 追加されたステップにスクロール
  setTimeout(() => {
    const cards = document.querySelectorAll('.step-card');
    if (cards.length > 0) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function removeStep(id) {
  steps = steps.filter(s => s.id !== id);
  renderSteps();
}

function updateStepField(id, field, value) {
  const step = steps.find(s => s.id === id);
  if (step) step[field] = value;
}

async function uploadCoverImage(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('image', file);
  const res = await fetch('/api/manuals/step-image', { method: 'POST', body: form });
  if (!res.ok) { alert('画像のアップロードに失敗しました'); return; }
  const data = await res.json();
  coverImageName = data.filename;
  const drop = document.getElementById('coverImageDrop');
  drop.innerHTML = `<img src="/uploads/${data.filename}" style="max-width:100%; max-height:200px; border-radius:4px;">`;
}

async function uploadStepImage(id, input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('image', file);
  const res = await fetch('/api/manuals/step-image', { method: 'POST', body: form });
  if (!res.ok) { alert('画像のアップロードに失敗しました'); return; }
  const data = await res.json();
  const step = steps.find(s => s.id === id);
  if (step) step.imageName = data.filename;
  const drop = document.getElementById(`stepImgDrop_${id}`);
  if (drop) drop.innerHTML = `<img src="/uploads/${data.filename}" style="max-width:100%; max-height:300px; border-radius:4px;">`;
}

function renderSteps() {
  const container = document.getElementById('stepsList');
  container.innerHTML = steps.map((step, i) => `
    <div class="card mb-2 step-card" data-step-id="${step.id}">
      <div class="card-header" style="background:#f8f9fa; flex-wrap:wrap; gap:8px;">
        <div style="display:flex; align-items:center; gap:8px; flex:1; min-width:0;">
          <span style="background:var(--primary);color:white;border-radius:4px;padding:3px 10px;font-weight:700;white-space:nowrap;font-size:13px;">STEP ${i + 1}</span>
          <input type="text" class="form-control" placeholder="ステップのタイトル（任意）"
            value="${escAttr(step.title)}"
            oninput="updateStepField(${step.id}, 'title', this.value)"
            style="flex:1;">
        </div>
        <button type="button" onclick="removeStep(${step.id})" class="btn btn-danger btn-sm">削除</button>
      </div>
      <div class="card-body">
        <div class="step-image-drop" id="stepImgDrop_${step.id}"
          onclick="document.getElementById('stepImgInput_${step.id}').click()">
          ${step.imageName
            ? `<img src="/uploads/${step.imageName}" style="max-width:100%; max-height:300px; border-radius:4px;">`
            : `<div style="color:var(--text-muted);font-size:13px;">📷 クリックして画像を追加（任意）</div>`}
        </div>
        <input type="file" id="stepImgInput_${step.id}" accept="image/*" style="display:none;"
          onchange="uploadStepImage(${step.id}, this)">
        <textarea class="form-control" rows="3" placeholder="このステップの説明（任意）"
          oninput="updateStepField(${step.id}, 'description', this.value)"
        >${escHtml(step.description)}</textarea>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escAttr(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

// ---- 保存処理 ----

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const title = document.getElementById('title').value.trim();
  const description = document.getElementById('description').value.trim();
  const categoryId = document.getElementById('categorySelect').value;

  if (!title) {
    showAlert('alert', 'タイトルを入力してください', 'error');
    btn.disabled = false;
    btn.textContent = editId ? '更新する' : '保存する';
    return;
  }

  try {
    if (editId) {
      await updateManual(title, description, categoryId);
    } else {
      await createManual(title, description, categoryId);
    }
  } catch (err) {
    showAlert('alert', '予期せぬエラーが発生しました', 'error');
    btn.disabled = false;
    btn.textContent = editId ? '更新する' : '保存する';
  }
}

async function createManual(title, description, categoryId) {
  let res, data;

  if (currentType === 'steps') {
    if (steps.length === 0) {
      showAlert('alert', '少なくとも1つのステップを追加してください', 'error');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = '保存する';
      return;
    }
    const content = JSON.stringify({
      cover_image: coverImageName,
      steps: steps.map((s, i) => ({ order: i + 1, title: s.title, image: s.imageName, description: s.description }))
    });
    res = await fetch('/api/manuals/steps', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description, content, category_id: categoryId || null })
    });
  } else if (currentType === 'rich_text') {
    const content = quill.root.innerHTML;
    if (!content || content === '<p><br></p>') {
      showAlert('alert', '本文を入力してください', 'error');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = '保存する';
      return;
    }
    res = await fetch('/api/manuals/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description, content, category_id: categoryId || null })
    });
  } else {
    const file = document.getElementById('pdfFile').files[0];
    if (!file) {
      showAlert('alert', 'PDFファイルを選択してください', 'error');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = '保存する';
      return;
    }
    const form = new FormData();
    form.append('pdf', file);
    form.append('title', title);
    form.append('description', description);
    if (categoryId) form.append('category_id', categoryId);
    res = await fetch('/api/manuals/pdf', { method: 'POST', body: form });
  }

  data = await res.json();
  if (res.ok) {
    window.location.href = `/view.html?id=${data.id}`;
  } else {
    showAlert('alert', data.error || '保存に失敗しました', 'error');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '保存する';
  }
}

async function updateManual(title, description, categoryId) {
  let res, data;

  if (editManual.type === 'steps') {
    const content = JSON.stringify({
      cover_image: coverImageName,
      steps: steps.map((s, i) => ({ order: i + 1, title: s.title, image: s.imageName, description: s.description }))
    });
    res = await fetch(`/api/manuals/${editId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description, content, category_id: categoryId || null })
    });
  } else if (editManual.type === 'pdf') {
    const replaceCheck = document.getElementById('replacePdfCheck');
    if (replaceCheck && replaceCheck.checked) {
      const file = document.getElementById('pdfFile').files[0];
      if (!file) {
        showAlert('alert', '新しいPDFファイルを選択してください', 'error');
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = '更新する';
        return;
      }
      const form = new FormData();
      form.append('pdf', file);
      form.append('title', title);
      form.append('description', description);
      if (categoryId) form.append('category_id', categoryId);
      res = await fetch(`/api/manuals/${editId}/pdf`, { method: 'PUT', body: form });
    } else {
      res = await fetch(`/api/manuals/${editId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, category_id: categoryId || null })
      });
    }
  } else {
    const content = quill.root.innerHTML;
    res = await fetch(`/api/manuals/${editId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description, content, category_id: categoryId || null })
    });
  }

  data = await res.json();
  if (res.ok) {
    window.location.href = `/view.html?id=${editId}`;
  } else {
    showAlert('alert', data.error || '更新に失敗しました', 'error');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '更新する';
  }
}

init();
</script>
</body>
</html>
