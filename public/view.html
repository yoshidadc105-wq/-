<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マニュアル閲覧 - 社内マニュアルシステム</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .manual-content { line-height: 1.8; font-size: 15px; }
    .manual-content h1, .manual-content h2, .manual-content h3 { margin: 20px 0 10px; font-weight: 700; }
    .manual-content h1 { font-size: 22px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
    .manual-content h2 { font-size: 18px; }
    .manual-content h3 { font-size: 16px; }
    .manual-content p { margin-bottom: 12px; }
    .manual-content ul, .manual-content ol { padding-left: 24px; margin-bottom: 12px; }
    .manual-content li { margin-bottom: 4px; }
    .manual-content strong { font-weight: 700; }
    .manual-content em { font-style: italic; }
    .manual-content blockquote { border-left: 4px solid var(--primary); padding-left: 16px; color: var(--text-muted); margin: 12px 0; }
    .manual-content table { border-collapse: collapse; margin-bottom: 12px; }
    .manual-content th, .manual-content td { border: 1px solid var(--border); padding: 8px 12px; }
    .manual-content th { background: var(--bg); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">マニュアルシステム</a>
  <div class="navbar-right">
    <span class="navbar-user">ようこそ、<strong id="navUserName"></strong></span>
    <a href="/admin.html" id="navAdminLink" class="btn btn-secondary btn-sm hidden">管理者設定</a>
    <a href="/progress.html" id="navProgressLink" class="btn btn-secondary btn-sm hidden">進捗管理</a>
    <a href="/account.html" class="btn btn-secondary btn-sm">アカウント設定</a>
    <button onclick="logout()" class="btn btn-secondary btn-sm">ログアウト</button>
  </div>
</nav>

<div class="container">
  <div id="breadcrumb" class="text-sm text-muted mb-2">
    <a href="/" style="color: var(--primary);">← マニュアル一覧</a>
  </div>

  <div id="content"><div class="loading">読み込み中</div></div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay hidden" id="deleteModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">マニュアルの削除</span>
      <button class="modal-close" onclick="closeModal('deleteModal')">×</button>
    </div>
    <div class="modal-body">
      <p>このマニュアルを削除しますか？この操作は取り消せません。</p>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('deleteModal')" class="btn btn-secondary">キャンセル</button>
      <button onclick="deleteManual()" class="btn btn-danger">削除する</button>
    </div>
  </div>
</div>

<script src="/js/common.js"></script>
<script>
let manualId = null;
let currentUser = null;
let manualData = null;

async function init() {
  const params = new URLSearchParams(window.location.search);
  manualId = params.get('id');

  if (!manualId) { window.location.href = '/'; return; }

  currentUser = await loadCurrentUser();
  if (!currentUser) return;
  initNavbar(currentUser);

  await loadManual();
  await loadCheckStatus();
}

async function loadManual() {
  const res = await fetch(`/api/manuals/${manualId}`);

  if (!res.ok) {
    document.getElementById('content').innerHTML = `
      <div class="empty"><div class="empty-icon">❌</div>マニュアルが見つかりません<br>
      <a href="/" class="btn btn-primary mt-2">一覧に戻る</a></div>
    `;
    return;
  }

  manualData = await res.json();
  document.title = `${manualData.title} - マニュアルシステム`;

  const canEdit = currentUser.role === 'admin' || manualData.created_by === currentUser.id;
  const canDelete = currentUser.role === 'admin';

  let bodyHtml = '';

  if (manualData.type === 'pdf') {
    bodyHtml = `
      <div style="display:flex; gap:8px; margin-bottom:8px; align-items:center; flex-wrap:wrap;">
        <a href="/uploads/${manualData.file_path}" target="_blank" class="btn btn-primary btn-sm">🔍 別タブで開く（大きく見る）</a>
        <a href="/uploads/${manualData.file_path}" download="${manualData.file_name}" class="btn btn-secondary btn-sm">⬇ ダウンロード</a>
        ${canEdit ? `<a href="/create.html?id=${manualId}" class="btn btn-secondary btn-sm">✏ 編集</a>` : ''}
        ${canDelete ? `<button onclick="openModal('deleteModal')" class="btn btn-danger btn-sm">🗑 削除</button>` : ''}
      </div>
      <iframe src="/uploads/${manualData.file_path}#toolbar=1&view=FitH" class="pdf-viewer" style="min-height:80vh;"></iframe>
    `;
  } else if (manualData.type === 'steps') {
    let stepsData = {};
    try { stepsData = JSON.parse(manualData.content || '{}'); } catch(e) {}
    const stepsList = stepsData.steps || [];

    const coverHtml = stepsData.cover_image ? `
      <div class="card mb-2">
        <div class="card-body" style="text-align:center; padding:16px;">
          <img src="/uploads/${stepsData.cover_image}" style="max-width:100%; max-height:400px; border-radius:8px;">
        </div>
      </div>` : '';

    const stepsHtml = stepsList.map((step, i) => `
      <div class="card mb-2">
        <div class="card-header" style="background:var(--primary); color:white; border-bottom:none;">
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size:13px; font-weight:700; background:rgba(255,255,255,0.2); border-radius:4px; padding:2px 10px; white-space:nowrap;">STEP ${step.order || i + 1}</span>
            ${step.title ? `<span style="font-size:16px; font-weight:600;">${escHtml(step.title)}</span>` : ''}
          </div>
        </div>
        <div class="card-body">
          ${step.image ? `<div style="text-align:center; margin-bottom:16px;"><img src="/uploads/${step.image}" style="max-width:100%; max-height:500px; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,0.1);"></div>` : ''}
          ${step.description ? `<div style="white-space:pre-wrap; font-size:15px; line-height:1.8;">${escHtml(step.description)}</div>` : ''}
        </div>
      </div>
    `).join('');

    bodyHtml = coverHtml + (stepsList.length > 0 ? stepsHtml : '<div class="empty"><div class="empty-icon">📋</div>ステップがまだありません</div>');
  } else {
    bodyHtml = `
      <div class="card">
        <div class="card-body">
          <div class="manual-content">${manualData.content || ''}</div>
        </div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = `
    <div class="card mb-2">
      <div class="card-header">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <span class="badge ${manualData.type === 'pdf' ? 'badge-pdf' : manualData.type === 'steps' ? 'badge-steps' : 'badge-text'}">${manualData.type === 'pdf' ? 'PDF' : manualData.type === 'steps' ? 'ステップ' : 'テキスト'}</span>
            ${manualData.category_name ? `<span class="badge" style="background:#f1f5f9;color:var(--text-muted);">${manualData.category_name}</span>` : ''}
          </div>
          <h1 style="font-size: 22px; font-weight: 700;">${manualData.title}</h1>
          ${manualData.description ? `<p class="text-muted text-sm mt-1">${manualData.description}</p>` : ''}
          <div class="text-sm text-muted mt-1">
            作成者: ${manualData.created_by_name} ·
            作成日: ${formatDate(manualData.created_at)} ·
            更新日: ${formatDate(manualData.updated_at)}
          </div>
        </div>
        ${manualData.type !== 'pdf' ? `
        <div class="flex gap-2">
          ${canEdit ? `<a href="/create.html?id=${manualId}" class="btn btn-secondary btn-sm">✏ 編集</a>` : ''}
          ${canDelete ? `<button onclick="openModal('deleteModal')" class="btn btn-danger btn-sm">🗑 削除</button>` : ''}
        </div>
        ` : ''}
      </div>
    </div>
    ${bodyHtml}
    <div class="card mt-2">
      <div class="card-body" style="text-align:center; padding:24px;" id="checkArea">
        <div class="loading" style="padding:16px;"></div>
      </div>
    </div>
  `;
}

function escHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function loadCheckStatus() {
  const res = await fetch(`/api/progress/check/${manualId}`);
  const data = await res.json();
  renderCheckButton(data.checked, data.checked_at);
}

function renderCheckButton(checked, checkedAt) {
  const area = document.getElementById('checkArea');
  if (!area) return;
  if (checked) {
    area.innerHTML = `
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <span style="color:var(--success); font-weight:700; font-size:15px;">✅ 確認済み（${formatDate(checkedAt)}）</span>
        <button onclick="uncheckManual()" class="btn btn-secondary btn-sm">取り消す</button>
      </div>`;
  } else {
    area.innerHTML = `
      <button onclick="checkManual()" class="btn btn-success" style="font-size:15px; padding:12px 32px;">
        ✅ 確認しました
      </button>`;
  }
}

async function checkManual() {
  const res = await fetch(`/api/progress/check/${manualId}`, { method: 'POST' });
  if (res.ok) {
    const data = await fetch(`/api/progress/check/${manualId}`).then(r => r.json());
    renderCheckButton(data.checked, data.checked_at);
  }
}

async function uncheckManual() {
  const res = await fetch(`/api/progress/check/${manualId}`, { method: 'DELETE' });
  if (res.ok) renderCheckButton(false, null);
}

async function deleteManual() {
  const res = await fetch(`/api/manuals/${manualId}`, { method: 'DELETE' });
  if (res.ok) {
    window.location.href = '/';
  } else {
    const data = await res.json();
    alert(data.error || '削除に失敗しました');
    closeModal('deleteModal');
  }
}

init();
</script>
</body>
</html>
